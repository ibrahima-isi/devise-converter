version: "3.8"

services:
  devise-converter:
    image: ghcr.io/linuxserver/webtop:ubuntu-xfce
    container_name: devise_converter_desktop
    privileged: true
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - .:/app
    ports:
      - 5000:3000
    restart: unless-stopped
    entrypoint: |
      /bin/bash -c "
      echo 'Installing dependencies...'
      pip3 install -r /app/requirement.txt || echo 'Warning: Dependency installation failed.'
      echo 'Application ready.'
      exec /init"
