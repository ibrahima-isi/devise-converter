version: '3.8'

services:
  devise-converter:
    build: .
    container_name: devise-converter
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    # Uncomment the following line if you want to run in host network mode for better GUI performance
    # network_mode: host